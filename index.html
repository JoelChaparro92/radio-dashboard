<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Vyrorei al Fallo - En Vivo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="player-container">
        <h1>📻 Vyrorei al Fallo</h1>
        <p id="status" class="status-text">Monitoreando NAS Capiatá...</p>
        
        <div class="cover-art">
            <p id="now-playing">Cargando info...</p>
        </div>

        <button id="play-button" onclick="togglePlay()">PLAY</button>
    </div>

    <audio id="radio-stream" src="https://vyroreialfallo.com/listen/radio/radio.mp3"></audio>

    <script>
        const audio = document.getElementById('radio-stream');
        const btn = document.getElementById('play-button');
        const nowPlaying = document.getElementById('now-playing');

        // Función para Play/Pause
        function togglePlay() {
            if (audio.paused) {
                audio.play();
                btn.innerText = "PAUSE";
                btn.style.borderColor = "#ff4500";
                btn.style.color = "#ff4500";
            } else {
                audio.pause();
                btn.innerText = "PLAY";
                btn.style.borderColor = "#00ff00";
                btn.style.color = "#00ff00";
            }
        }

        // Función para conectar con la API de tu AzuraCast
        async function updateMetadata() {
            try {
                // Reemplaza esta URL con la API pública de tu estación si es distinta
                const response = await fetch('https://vyroreialfallo.com/api/nowplaying/radio');
                const data = await response.json();
                
                const song = data.now_playing.song.text;
                nowPlaying.innerText = song;
            } catch (error) {
                nowPlaying.innerText = "Señal en Vivo";
                console.error("Error obteniendo metadatos", error);
            }
        }

        // Actualizar cada 15 segundos (respetando tiempos de pausa del servidor)
        setInterval(updateMetadata, 15000);
        updateMetadata(); // Carga inicial
    </script>

</body>
</html>
